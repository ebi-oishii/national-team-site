<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">サッカー代表監督シミュレーター</a>
      <nav class="nav" aria-label="主要ページ">
        <a href="{{ '/support/' | relative_url }}">サポート</a>
        <a href="{{ '/privacy/' | relative_url }}">プライバシー</a>
        <a href="{{ '/terms/' | relative_url }}">利用規約</a>
      </nav>
    </header>
    <main class="page">
      {{ content }}
    </main>
    <footer class="site-footer">
      <a href="{{ '/commerce/' | relative_url }}">特定商取引法に基づく表記</a>
      <a href="{{ '/disclaimer/' | relative_url }}">免責事項</a>
    </footer>
  </body>
</html>
